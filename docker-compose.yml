version: '3.8'

services:

  mysql:
    image: mysql:latest
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: mydb
    ports:
      - "3306:3306"
    volumes:
      - /home/ubuntu/data:/var/lib/mysql
    networks:
      - my-network

  backend:
    build: ./backend
    container_name: todo-backend
    restart: always
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASS: root123
      DB_NAME: mydb
    ports:
      - "5000:5000"
    depends_on:
      - mysql
    networks:
      - my-network

  frontend:
    build: .
    container_name: react-app
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - my-network

networks:
  my-network:
    driver: bridge
